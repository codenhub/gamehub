<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title data-i18n="game.2048.pageTitle">2048 | GameHub</title>
    <link rel="stylesheet" href="../../_ui/styles/index.css" />
    <script type="module" src="../../_ui/scripts/index.ts"></script>
    <script src="../../_ui/components/index.js" type="module" defer></script>
    <script src="./index.ts" type="module" defer></script>

    <style>
      @reference "../../_ui/styles/index.css";

      .game-grid {
        @apply grid grid-cols-4 gap-2 p-2 aspect-square;
      }

      .game-tile {
        @apply pixel-corner-lg-4 flex items-center justify-center aspect-square text-5xl md:text-7xl font-bold bg-background transition duration-200 select-none;
      }

      .game-tile[data-value]:not([data-value="0"]) {
        animation: tile-pop 0.12s ease-out;
      }

      @keyframes tile-pop {
        0% {
          transform: scale(0.85);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <gh-header title="2048" data-i18n-title="game.2048.title" backBtn></gh-header>

    <main class="flex flex-1 size-full justify-center p-4">
      <section class="flex flex-1 max-w-lg w-full h-auto gap-4 py-4 flex-col items-center">
        <!-- TOP BAR -->
        <div class="flex items-center w-full justify-between">
          <div class="flex gap-4 text-xs sm:text-sm">
            <p>
              <span data-i18n="common.score">Score</span>
              :
              <span id="score">0</span>
            </p>
            <p>
              <span data-i18n="common.best">Best</span>
              :
              <span id="high-score">0</span>
            </p>
          </div>
        </div>

        <!-- GAME BOARD -->
        <div class="relative bg-border pixel-corner-lg-4 p-1 w-full aspect-square">
          <div id="grid" class="game-grid size-full pixel-corner-lg-4 bg-foreground"></div>

          <!-- Start screen -->
          <div
            id="start-screen"
            class="absolute inset-0 bg-foreground/80 flex flex-col items-center justify-center gap-4 pixel-corner-lg-4 z-20"
          >
            <h2 data-i18n="game.2048.title">2048</h2>
            <p class="text-center" data-i18n="game.2048.startHint">Combine tiles to reach 2048!</p>
            <button id="start-btn" class="primary-btn" data-i18n="common.play">Play</button>
          </div>

          <!-- Game over screen -->
          <div
            id="game-over-screen"
            class="absolute inset-0 flex-col items-center justify-center gap-2 bg-foreground/80 pixel-corner-lg-4 z-20 hidden"
          >
            <h2 class="text-error" data-i18n="common.gameOver">GAME OVER</h2>
            <p class="text-2xl mb-2">
              <span data-i18n="common.score">Score</span>
              :
              <span id="final-score">0</span>
            </p>
            <button id="restart-btn" class="primary-btn" data-i18n="common.tryAgain">Try Again</button>
          </div>

          <!-- Win screen -->
          <div
            id="win-screen"
            class="absolute inset-0 flex-col items-center justify-center gap-2 bg-foreground/80 pixel-corner-lg-4 z-20 hidden"
          >
            <h2 class="text-success" data-i18n="common.youWon">YOU WON!</h2>
            <p class="text-2xl mb-2">
              <span data-i18n="common.score">Score</span>
              :
              <span id="win-score">0</span>
            </p>
            <button id="win-restart-btn" class="primary-btn" data-i18n="common.playAgain">Play Again</button>
          </div>
        </div>

        <!-- Hints -->
        <div class="hidden sm:flex text-text-secondary">
          <p data-i18n="game.2048.desktopHint">Use Arrow Keys or WASD to move tiles</p>
        </div>
        <div class="flex sm:hidden text-text-secondary">
          <p data-i18n="game.2048.mobileHint">Swipe to move tiles</p>
        </div>

        <!-- Mobile D-Pad -->
        <div class="flex flex-col items-center gap-2 sm:hidden">
          <button class="icon-btn size-14 upBtn" aria-label="Move Up" data-i18n-aria-label="common.moveUp">
            <gh-icon src="/assets/icons/chevron-up.webp" width="2rem"></gh-icon>
          </button>
          <div class="flex gap-2">
            <button class="icon-btn size-14 leftBtn" aria-label="Move Left" data-i18n-aria-label="common.moveLeft">
              <span class="flex -rotate-90">
                <gh-icon src="/assets/icons/chevron-up.webp" width="2rem"></gh-icon>
              </span>
            </button>
            <button class="icon-btn size-14 downBtn" aria-label="Move Down" data-i18n-aria-label="common.moveDown">
              <span class="flex rotate-180">
                <gh-icon src="/assets/icons/chevron-up.webp" width="2rem"></gh-icon>
              </span>
            </button>
            <button class="icon-btn size-14 rightBtn" aria-label="Move Right" data-i18n-aria-label="common.moveRight">
              <span class="flex rotate-90">
                <gh-icon src="/assets/icons/chevron-up.webp" width="2rem"></gh-icon>
              </span>
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
