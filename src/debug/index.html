<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title data-i18n="debug.pageTitle">Testing | GameHub</title>
    <link rel="stylesheet" href="../_ui/styles/index.css" />
    <script type="module" src="../_ui/scripts/index.ts"></script>
    <script src="../_ui/components/index.js" type="module" defer></script>
    <script src="./index.ts" type="module" defer></script>
  </head>
  <body>
    <gh-header header-title="debug.title=Testing" backBtn></gh-header>

    <main class="flex flex-1 size-full justify-center p-4">
      <section class="flex flex-1 flex-col max-w-7xl w-full h-auto gap-8 max-sm:flex-col max-sm:items-center">
        <div class="flex flex-col gap-4">
          <h1 data-i18n="debug.section.alerts">Alerts</h1>
          <div class="flex gap-4">
            <button id="success-alert-btn" class="primary-btn size-fit" data-i18n="debug.alert.success">
              Show success alert
            </button>
            <button id="error-alert-btn" class="primary-btn size-fit" data-i18n="debug.alert.error">
              Show error alert
            </button>
            <button id="warning-alert-btn" class="primary-btn size-fit" data-i18n="debug.alert.warning">
              Show warning alert
            </button>
            <button id="info-alert-btn" class="primary-btn size-fit" data-i18n="debug.alert.info">
              Show info alert
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-4">
          <h1 data-i18n="debug.section.audioModule">Audio module</h1>
          <div class="flex gap-4">
            <button id="play-sfx-btn" class="primary-btn size-fit" data-i18n="debug.audio.playSfx">Play SFX</button>
            <button id="play-music-btn" class="primary-btn size-fit" data-i18n="debug.audio.playMusic">
              Play music
            </button>
            <button id="pause-music-btn" class="primary-btn size-fit" data-i18n="debug.audio.pauseMusic">
              Pause music
            </button>
            <button id="resume-music-btn" class="primary-btn size-fit" data-i18n="debug.audio.resumeMusic">
              Resume music
            </button>
            <button id="change-music-btn" class="primary-btn size-fit" data-i18n="debug.audio.changeMusic">
              Change music
            </button>
            <button id="track-music-btn" class="primary-btn size-fit" data-i18n="debug.audio.showCurrentTrack">
              Show current track
            </button>
          </div>
        </div>
      </section>
    </main>

    <gh-footer></gh-footer>
  </body>
</html>
